<script>

const API_KEY = "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";

async function askAI(){

    const question =
    document.getElementById("question").value.trim();

    const answerBox =
    document.getElementById("answer");

    if(question === ""){
        answerBox.innerText = "Please enter a question.";
        return;
    }

    answerBox.innerText = "Loading... Please wait.";

    try{

        const response = await fetch(
        "https://api.openai.com/v1/chat/completions",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "gpt-4.1-mini",
                messages: [
                    {
                        role: "user",
                        content: question
                    }
                ]
            })
        });

        const data = await response.json();

        if(
            data.choices &&
            data.choices[0] &&
            data.choices[0].message
        ){

            answerBox.innerText =
            data.choices[0].message.content;

        }else{

            answerBox.innerText =
            JSON.stringify(data,null,2);

        }

    }catch(error){

        answerBox.innerText =
        "Error: " + error.message;

    }

}

document.getElementById("question")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        askAI();
    }

});

</script>
