<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Shiv AI</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background-image:url("background.png");
            background-size:cover;
            background-position:center;
            font-family:Arial,sans-serif;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:auto;
            text-align:center;
            padding-top:20px;
        }

        .logo{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
        }

        h1{
            color:white;
            margin-top:15px;
            text-shadow:2px 2px 5px black;
        }

        h2{
            color:white;
            margin-top:10px;
            margin-bottom:25px;
            text-shadow:2px 2px 5px black;
        }

        .chat-box{
            margin-top:20px;
        }

        input{
            width:70%;
            padding:12px;
            font-size:16px;
            border-radius:10px;
            border:none;
        }

        button{
            padding:12px 20px;
            font-size:16px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            margin-left:5px;
        }

        #answer{
            margin-top:20px;
            background:white;
            padding:20px;
            border-radius:15px;
            min-height:150px;
            text-align:left;
            white-space:pre-wrap;
        }

        @media(max-width:600px){

            input{
                width:100%;
                margin-bottom:10px;
            }

            button{
                width:100%;
                margin-left:0;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="Logo" class="logo">

    <h1>Developer Shiv AI 🤖</h1>

    <h2>Hindi AI Assistant</h2>

    <div class="chat-box">

        <input
            type="text"
            id="question"
            placeholder="यहाँ अपना सवाल लिखो">

        <button onclick="askAI()">
            पूछो
        </button>

    </div>

    <div id="answer">
        यहाँ जवाब आएगा...
    </div>

</div>

<script>

const API_KEY = "AQ.Ab8RN6IpxcSo7Fli_PZXngJFcNM1M6WrqZkcdpWjfuV0faDLUA";

async function askAI(){

    const question =
    document.getElementById("question").value;

    const answerBox =
    document.getElementById("answer");

    answerBox.innerText = "लोड हो रहा है...";

    try{

        const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                contents:[
                {
                    parts:[
                    {
                        text:"हमेशा हिंदी में जवाब दो। सवाल: " + question
                    }]
                }]
            })
        });

        const data = await response.json();

        if(
            data.candidates &&
            data.candidates[0] &&
            data.candidates[0].content &&
            data.candidates[0].content.parts &&
            data.candidates[0].content.parts[0]
        ){

            answerBox.innerText =
            data.candidates[0].content.parts[0].text;

        }else{

            answerBox.innerText =
            JSON.stringify(data,null,2);

        }

    }catch(error){

        answerBox.innerText =
        "Error: " + error;

    }

}

</script>

</body>
</html>
