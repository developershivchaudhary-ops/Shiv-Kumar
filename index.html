<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Shiv</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#b8ece8;
    font-family:Arial,sans-serif;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    text-align:center;
    padding-top:30px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

h1{
    color:white;
    text-shadow:2px 2px 5px black;
    margin-top:15px;
}

h2{
    color:white;
    text-shadow:2px 2px 5px black;
    margin-top:10px;
    margin-bottom:25px;
}

.chat-box{
    margin-top:20px;
}

#question{
    width:70%;
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #333;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-left:5px;
}

#answer{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:15px;
    min-height:150px;
    text-align:left;
    white-space:pre-wrap;
}

@media(max-width:600px){
    #question{
        width:100%;
        margin-bottom:10px;
    }

    button{
        width:100%;
        margin-left:0;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="Logo" class="logo">

    <h1>Developer Shiv</h1>
    <h2>Your AI Assistant</h2>

    <div class="chat-box">
        <input
            type="text"
            id="question"
            placeholder="Ask anything...">

        <button onclick="askAI()">Search</button>
    </div>

    <div id="answer">
        Welcome! Ask your question...
    </div>

</div>

<script>

const API_KEY = "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";

async function askAI(){

    const question = document.getElementById("question").value.trim();
    const answerBox = document.getElementById("answer");

    if(!question){
        answerBox.innerText = "Please enter a question.";
        return;
    }

    answerBox.innerText = "Loading...";

    try{

        const response = await fetch(
            "https://api.openai.com/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + API_KEY
                },
                body:JSON.stringify({
                    model:"gpt-4.1-mini",
                    messages:[
                        {
                            role:"user",
                            content:question
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        if(data.choices && data.choices[0]){
            answerBox.innerText =
            data.choices[0].message.content;
        }
        else{
            answerBox.innerText =
            JSON.stringify(data,null,2);
        }

    }
    catch(error){
        answerBox.innerText =
        "Error: " + error.message;
    }

}

const inputBox = document.getElementById("question");

if(inputBox){
    inputBox.addEventListener("keypress", function(event){
        if(event.key === "Enter"){
            askAI();
        }
    });
}

</script>

</body>
</html>
